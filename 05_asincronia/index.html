<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Permite caracteres especiales como tildes y ñ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive -->
    <title>Practica 5 - Asincronia</title>
    <link rel="stylesheet" href="/05_asincronia/css/styless.css">
    <!-- Archivo de estilos -->
</head>

<body>
    <main class="page">
    <!-- =========================
         SECCIÓN 1: SIMULADOR
         (Interacción con JS mediante IDs)
    ========================= -->
    <section class="container">
      <h1>Simulador de Carga de Recursos</h1>
      
      <div class="button-group">
        <!-- IDs conectados directamente con JS (eventos) -->
        <button type="button" id="btn-secuencial">Cargar Secuencial</button>
        <button type="button" id="btn-paralelo">Cargar Paralelo</button>
        <button type="button" id="btn-limpiar">Limpiar Log</button>
      </div>
      <div id="log" class="log"></div>
      <!-- Aquí JS inserta dinámicamente los mensajes/logs -->
      <div id="resultados" class="resultados"></div>
      <!-- Aquí se muestra la comparación de rendimiento -->
    </section>

    <!-- =========================
         SECCIÓN 2: TEMPORIZADOR
         (Manejo de estado + UI dinámica)
    ========================= -->
    <section class="container">
      <h2>Temporizador Regresivo</h2>

      <div class="form-group">
        <label for="input-tiempo">Tiempo en segundos:</label>
        <!-- Input que el JS usa como valor inicial -->
        <input type="number" id="input-tiempo" value="60" min="1" max="600">
      </div>

      <div id="display" class="display">00:00</div>
      <!-- JS actualiza este valor cada segundo -->

      <div class="progress-container">
        <div id="barra-progreso" class="progress-bar"></div>
        <!-- JS modifica el width (%) para simular progreso -->
      </div>

      <div class="button-group">
        <!-- Controles del temporizador -->
        <button type="button" id="btn-iniciar">Iniciar</button>
        <button type="button" id="btn-detener">Detener</button>
        <button type="button" id="btn-reiniciar">Reiniciar</button>
      </div>
    </section>

    <!-- =========================
         SECCIÓN 3: ERRORES
         (Simulación de fallos y reintentos)
    ========================= -->
    <section class="container">
      <h2>Manejo de Errores</h2>

      <div class="button-group">
        <!-- Disparan lógica de errores en JS -->
        <button type="button" id="btn-error">Simular Error</button>
        <button type="button" id="btn-reintentos">Reintentos Automáticos</button>
      </div>

      <div id="log-errores" class="log"></div>
      <!-- Área separada para logs de error -->
    </section>
  </main>

  <!-- JS principal: usa los IDs para manejar toda la lógica -->
  <script defer src="js/app.js"></script>
  <!-- defer asegura que el HTML cargue antes de ejecutar JS -->

</body>
</html>
